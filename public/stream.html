<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>⚽ Soccer Live — Stream</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .error {
            display: none;
            position: fixed;
            inset: 0;
            background: #0a0e1a;
            color: #8896b3;
            font-family: Inter, sans-serif;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            text-align: center;
            padding: 40px;
        }

        .error span {
            font-size: 48px;
        }

        .error h2 {
            color: #f0f4ff;
            font-size: 20px;
        }

        .back-btn {
            margin-top: 8px;
            background: #00d4ff;
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 10px 22px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
        }

        .back-btn:hover {
            opacity: 0.85;
        }
    </style>
</head>

<body>
    <iframe id="player" allowfullscreen
        allow="autoplay; encrypted-media; fullscreen; picture-in-picture; clipboard-write"
        referrerpolicy="no-referrer-when-downgrade" scrolling="no"></iframe>

    <div class="error" id="errorBox">
        <span>🚫</span>
        <h2>Không thể phát luồng này</h2>
        <p>Nguồn stream từ chối hiển thị trong trình duyệt.</p>
        <a class="back-btn" href="javascript:history.back()">← Quay lại</a>
    </div>

    <script>
        // Get stream URL from ?src= query param
        const params = new URLSearchParams(location.search);
        const src = params.get('src');

        if (!src) {
            document.getElementById('errorBox').style.display = 'flex';
            document.getElementById('player').style.display = 'none';
        } else {
            document.title = '⚽ Stream — Soccer Live';
            const frame = document.getElementById('player');
            frame.src = decodeURIComponent(src);
            // If iframe fires error event, show fallback
            frame.addEventListener('error', () => {
                document.getElementById('errorBox').style.display = 'flex';
            });
        }
    </script>
</body>

</html>
