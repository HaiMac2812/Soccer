services:
  - type: web
    name: soccer-live
    runtime: node
    # npm install --include=dev ensures vite+plugins are installed even if NODE_ENV=production
    buildCommand: npm install --include=dev && npm run build
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: SPORTSRC_API_KEY
        sync: false   # Enter this in Render dashboard (optional — users can set via UI)
    autoDeploy: true
